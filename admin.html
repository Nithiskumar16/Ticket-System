<style>

table{
width:100%;
border-collapse:collapse;
font-family:Segoe UI;
}

th{
background:#2d6cdf;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f5f5f5;
}

</style>

<h2>Ticket Admin Dashboard</h2>

<table id="tickets"></table>

<script>

const API="https://script.google.com/macros/s/AKfycbwAaJoI9l-wBeq-jb6wa0u5dSHbzlpAzPrZflzre1wHo6nydkp1_ZtX7VZVg1Wt5bji/exec"

fetch(API)

.then(res=>res.json())

.then(data=>{

let table="<tr><th>ID</th><th>Name</th><th>Issue</th><th>Priority</th><th>Status</th></tr>"

for(let i=1;i<data.length;i++){

let color=""

if(data[i][6]=="High") color="red"
if(data[i][6]=="Medium") color="orange"
if(data[i][6]=="Low") color="green"

table+="<tr>"+
"<td>"+data[i][0]+"</td>"+
"<td>"+data[i][2]+"</td>"+
"<td>"+data[i][4]+"</td>"+
"<td style='color:"+color+"'>"+data[i][6]+"</td>"+
"<td>"+data[i][7]+"</td>"+
"</tr>"

}

document.getElementById("tickets").innerHTML=table

})

</script>
